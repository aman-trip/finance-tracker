spring:
  cache:
    type: redis
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/finance_tracker}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

logging:
  level:
    com.finance: INFO

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://127.0.0.1:4173,http://127.0.0.1:5173}}
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:${JWT_SECRET:}}
    refresh-token-secret: ${JWT_REFRESH_SECRET:${JWT_SECRET:}}
    access-token-expiration-seconds: 3600
    refresh-token-expiration-seconds: 1209600
  cache:
    report-ttl-minutes: ${CACHE_REPORT_TTL_MINUTES:5}

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
