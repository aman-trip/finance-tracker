spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  level:
    com.finance: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4173,http://localhost:5173,http://127.0.0.1:4173,http://127.0.0.1:5173}
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:}
    refresh-token-secret: ${JWT_REFRESH_SECRET:}
    access-token-expiration-seconds: 3600
    refresh-token-expiration-seconds: 1209600
