services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-tracker-postgres
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  backend:
    build:
      context: ./backend
    container_name: finance-tracker-backend
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finance_tracker
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ALLOWED_ORIGINS: http://localhost:4173,http://localhost:5173,http://127.0.0.1:4173,http://127.0.0.1:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: finance-tracker-frontend
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres_data:
